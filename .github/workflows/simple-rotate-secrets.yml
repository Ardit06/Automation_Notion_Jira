name: Simple Secret Rotation

on:
  workflow_dispatch: # run manually
  schedule:
    - cron: '0 0 1 * *' # monthly rotation (1st day of every month at midnight UTC)

jobs:
  rotate-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install GitHub CLI
        uses: cli/cli-action@v2
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm ci
          
      - name: Build project
        run: |
          npm run build
          
      - name: Manual Token Rotation
        run: |
          echo "🔄 Starting manual token rotation process..."
          echo ""
          echo "📋 Instructions:"
          echo "1. Go to your Notion integration settings"
          echo "2. Generate a new API key"
          echo "3. Go to your Jira account settings"
          echo "4. Generate a new API token"
          echo "5. Update the secrets manually in GitHub"
          echo ""
          echo "🔗 Links to update tokens:"
          echo "- Notion: https://www.notion.so/my-integrations"
          echo "- Jira: https://id.atlassian.com/manage-profile/security/api-tokens"
          echo ""
          echo "📝 Current secrets to update:"
          echo "- NOTION_API_KEY"
          echo "- JIRA_API_TOKEN"
          echo "- JIRA_EMAIL (if changed)"
          echo ""
          echo "⚠️  Remember to:"
          echo "1. Test the new tokens locally first"
          echo "2. Update GitHub secrets"
          echo "3. Restart your application"
          echo "4. Monitor logs for any issues"
          
      - name: Test current credentials
        run: |
          echo "🧪 Testing current credentials..."
          
          # Test Notion connection
          echo "Testing Notion connection..."
          node -e "
            try {
              const { NotionService } = require('./dist/services/notionService');
              const notion = new NotionService();
              console.log('✅ Notion service loaded successfully');
            } catch (err) {
              console.error('❌ Notion service error:', err.message);
              process.exit(1);
            }
          "
          
          # Test Jira connection
          echo "Testing Jira connection..."
          node -e "
            try {
              const { JiraService } = require('./dist/services/jiraService');
              const jira = new JiraService();
              console.log('✅ Jira service loaded successfully');
            } catch (err) {
              console.error('❌ Jira service error:', err.message);
              process.exit(1);
            }
          "
          
      - name: Create rotation reminder
        run: |
          echo "📅 Token rotation reminder created!"
          echo "Next rotation scheduled for: $(date -d '+1 month' '+%Y-%m-%d')"
          echo ""
          echo "🔔 To update tokens manually:"
          echo "1. Run this workflow manually (workflow_dispatch)"
          echo "2. Follow the instructions above"
          echo "3. Update GitHub secrets"
          echo "4. Test your application"
