name: Rotate Secrets

on:
  workflow_dispatch: # run manually
  schedule:
    - cron: '0 0 1 * *' # monthly rotation (1st of every month at midnight)

jobs:
  rotate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        uses: cli/cli-action@v2
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Token Rotation Reminder
        run: |
          echo "🔄 Token Rotation Reminder"
          echo "=========================="
          echo ""
          echo "It's time to rotate your API tokens for security!"
          echo ""
          echo "📋 Current tokens that need rotation:"
          echo "   • NOTION_API_KEY"
          echo "   • JIRA_API_TOKEN" 
          echo "   • NOTION_WEBHOOK_SECRET (if needed)"
          echo ""
          echo "🔗 Links to generate new tokens:"
          echo "   • Notion API Key: https://www.notion.so/my-integrations"
          echo "   • Jira API Token: https://id.atlassian.com/manage-profile/security/api-tokens"
          echo ""
          echo "⚙️  Steps to rotate:"
          echo "   1. Generate new tokens from the links above"
          echo "   2. Update GitHub Secrets in this repository"
          echo "   3. Update your local .env file"
          echo "   4. Test the new tokens"
          echo ""
          echo "📧 This is an automated reminder from your Notion-Jira automation service."

      - name: Check Token Age
        run: |
          echo "📅 Last rotation check: $(date)"
          echo "📅 Next rotation: $(date -d '+30 days')"
          echo ""
          echo "💡 Tip: Rotate tokens every 30 days for maximum security"

      - name: Update Rotation Log
        run: |
          echo "$(date): Token rotation reminder sent" >> rotation-log.txt
          echo "Repository: ${{ github.repository }}" >> rotation-log.txt
          echo "Workflow: ${{ github.workflow }}" >> rotation-log.txt
          echo "---" >> rotation-log.txt
