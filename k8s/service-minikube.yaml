apiVersion: v1
kind: Service
metadata:
  name: notion-jira-automation
  labels:
    app: notion-jira-automation
spec:
  type: NodePort  # Use NodePort for Minikube instead of LoadBalancer
  ports:
    - port: 80
      targetPort: 3003
      protocol: TCP
      name: http
      nodePort: 30080  # Fixed port for easy access
  selector:
    app: notion-jira-automation
